name: Run Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting
        run: |
          pip install flake8 black mypy
          flake8 src/ --max-line-length=120 --exclude=__pycache__,*.pyc || echo "Flake8 found issues"
          black --check src/ || echo "Black formatting issues found"
          mypy src/ --ignore-missing-imports || echo "MyPy type issues found"
        continue-on-error: true

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short || echo "Some unit tests failed"
        continue-on-error: true

      - name: Run property tests
        run: |
          pytest tests/properties/ -v --tb=short || echo "Some property tests failed"
        continue-on-error: true

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linting
        working-directory: frontend
        run: npm run lint || echo "Linting issues found"
        continue-on-error: true

      - name: Run tests
        working-directory: frontend
        run: npm test -- --run || echo "Some tests failed"
        continue-on-error: true

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
