  get-infrastructure-outputs:
    name: Get Infrastructure Outputs
    runs-on: ubuntu-latest
    needs: validate-input
    
    outputs:
      api_url: ${{ steps.get-outputs.outputs.api_url }}
      cognito_user_pool_id: ${{ steps.get-outputs.outputs.cognito_user_pool_id }}
      cognito_client_id: ${{ steps.get-outputs.outputs.cognito_client_id }}
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get infrastructure outputs from AWS
        id: get-outputs
        run: |
          # Get API Gateway URL
          API_ID=$(aws apigatewayv2 get-apis --query "Items[?Name=='accounting-copilot-api-staging'].ApiId | [0]" --output text)
          API_URL="https://${API_ID}.execute-api.${{ env.AWS_REGION }}.amazonaws.com"
          echo "api_url=${API_URL}" >> $GITHUB_OUTPUT
          
          # Get Cognito User Pool ID
          USER_POOL_ID=$(aws cognito-idp list-user-pools --max-results 10 --query "UserPools[?Name=='accounting-copilot-staging'].Id | [0]" --output text)
          echo "cognito_user_pool_id=${USER_POOL_ID}" >> $GITHUB_OUTPUT
          
          # Get Cognito Client ID
          CLIENT_ID=$(aws cognito-idp list-user-pool-clients --user-pool-id ${USER_POOL_ID} --query "UserPoolClients[0].ClientId" --output text)
          echo "cognito_client_id=${CLIENT_ID}" >> $GITHUB_OUTPUT
          
          echo "✅ Retrieved infrastructure outputs from AWS"

  build-lambdas:
    name: Build Lambda Packages
    runs-on: ubuntu-latest
    needs: get-infrastructure-outputs
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lambda.txt

      - name: Build Lambda packages
        run: |
          chmod +x scripts/build-lambda-packages.sh
          ./scripts/build-lambda-packages.sh

      - name: Upload Lambda packages
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages
          path: lambda-packages/
          retention-days: 1

  deploy-lambdas:
    name: Deploy Lambda Functions
    runs-on: ubuntu-latest
    needs: [get-infrastructure-outputs, build-lambdas]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Lambda packages
        uses: actions/download-artifact@v4
        with:
          name: lambda-packages
          path: lambda-packages/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Lambda functions
        run: |
          chmod +x scripts/deploy-lambdas.sh
          ./scripts/deploy-lambdas.sh

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: get-infrastructure-outputs
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Create .env file
        working-directory: frontend
        run: |
          cat > .env << EOF
          VITE_API_URL=${{ needs.get-infrastructure-outputs.outputs.api_url }}
          VITE_COGNITO_USER_POOL_ID=${{ needs.get-infrastructure-outputs.outputs.cognito_user_pool_id }}
          VITE_COGNITO_CLIENT_ID=${{ needs.get-infrastructure-outputs.outputs.cognito_client_id }}
          VITE_AWS_REGION=${{ env.AWS_REGION }}
          EOF

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        working-directory: frontend
        run: |
          BUCKET_NAME=$(aws s3 ls | grep accounting-copilot-frontend-staging | awk '{print $3}')
          aws s3 sync dist/ s3://$BUCKET_NAME/ --delete
          aws cloudfront create-invalidation --distribution-id $(aws cloudfront list-distributions --query "DistributionList.Items[?Origins.Items[?DomainName.contains(@, '$BUCKET_NAME')]].Id | [0]" --output text) --paths "/*" || true

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [get-infrastructure-outputs, deploy-lambdas, deploy-frontend]
    if: always()
    
    steps:
      - name: Deployment Summary
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Infrastructure: Managed manually (skipped)" >> $GITHUB_STEP_SUMMARY
          echo "- Lambda Functions: ${{ needs.deploy-lambdas.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ needs.deploy-frontend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "API URL: ${{ needs.get-infrastructure-outputs.outputs.api_url }}" >> $GITHUB_STEP_SUMMARY
