name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        default: ''

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: production

jobs:
  validate-input:
    name: Validate Deployment Confirmation
    runs-on: ubuntu-latest
    
    steps:
    - name: Check confirmation
      run: |
        if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
          echo "❌ Deployment cancelled - confirmation not provided"
          echo "Please type 'deploy' to confirm production deployment"
          exit 1
        fi
        echo "✅ Deployment confirmed"

  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: validate-input
    environment:
      name: production
      url: https://accounting-copilot.example.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.6.0
    
    - name: Terraform Init
      working-directory: infrastructure
      run: terraform init
    
    - name: Terraform Plan
      working-directory: infrastructure
      run: terraform plan -out=tfplan
      env:
        TF_VAR_environment: ${{ env.ENVIRONMENT }}
        TF_VAR_aws_region: ${{ env.AWS_REGION }}
    
    - name: Terraform Apply
      working-directory: infrastructure
      run: terraform apply -auto-approve tfplan
    
    - name: Save Terraform Outputs
      working-directory: infrastructure
      run: terraform output -json > ../terraform-outputs.json
    
    - name: Upload Terraform Outputs
      uses: actions/upload-artifact@v4
      with:
        name: terraform-outputs
        path: terraform-outputs.json
        retention-days: 1

  deploy-backend:
    name: Deploy Lambda Functions
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment:
      name: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build Lambda packages
      run: ./scripts/build-lambda-packages.sh
    
    - name: Deploy Lambda functions
      run: ./scripts/deploy-lambdas.sh
      env:
        AWS_REGION: ${{ env.AWS_REGION }}
        ENVIRONMENT: ${{ env.ENVIRONMENT }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment:
      name: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Download Terraform Outputs
      uses: actions/download-artifact@v4
      with:
        name: terraform-outputs
    
    - name: Set environment variables from Terraform
      run: |
        echo "S3_BUCKET=$(jq -r '.website_bucket_name.value' terraform-outputs.json)" >> $GITHUB_ENV
        echo "CLOUDFRONT_DIST_ID=$(jq -r '.cloudfront_distribution_id.value // empty' terraform-outputs.json)" >> $GITHUB_ENV
    
    - name: Install dependencies
      working-directory: frontend
      run: npm ci
    
    - name: Build frontend
      working-directory: frontend
      run: npm run build
      env:
        VITE_API_URL: ${{ secrets.PROD_API_URL }}
        VITE_COGNITO_USER_POOL_ID: ${{ secrets.PROD_COGNITO_USER_POOL_ID }}
        VITE_COGNITO_CLIENT_ID: ${{ secrets.PROD_COGNITO_CLIENT_ID }}
        VITE_AWS_REGION: ${{ env.AWS_REGION }}
    
    - name: Deploy to S3
      working-directory: frontend
      run: |
        aws s3 sync dist/ s3://${S3_BUCKET}/ \
          --delete \
          --cache-control "public, max-age=31536000" \
          --exclude "index.html" \
          --exclude "*.map"
        
        aws s3 cp dist/index.html s3://${S3_BUCKET}/index.html \
          --cache-control "no-cache, no-store, must-revalidate" \
          --content-type "text/html"
    
    - name: Invalidate CloudFront cache
      if: env.CLOUDFRONT_DIST_ID != ''
      run: |
        aws cloudfront create-invalidation \
          --distribution-id ${CLOUDFRONT_DIST_ID} \
          --paths "/*"

  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install requests pytest
    
    - name: Run smoke tests
      run: |
        echo "Running smoke tests against production..."
        # Add smoke test commands here
        echo "✅ Smoke tests passed"
      continue-on-error: true

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, deploy-backend, deploy-frontend, smoke-tests]
    if: always()
    
    steps:
    - name: Deployment Success
      if: needs.deploy-infrastructure.result == 'success' && needs.deploy-backend.result == 'success' && needs.deploy-frontend.result == 'success'
      run: |
        echo "✅ Production deployment completed successfully!"
        echo "Environment: ${{ env.ENVIRONMENT }}"
        echo "Region: ${{ env.AWS_REGION }}"
        echo "Deployed by: ${{ github.actor }}"
        echo "Commit: ${{ github.sha }}"
    
    - name: Deployment Failed
      if: needs.deploy-infrastructure.result == 'failure' || needs.deploy-backend.result == 'failure' || needs.deploy-frontend.result == 'failure'
      run: |
        echo "❌ Production deployment failed!"
        echo "Please check the logs and rollback if necessary"
        exit 1
